services:
  gh-plane-sync:
    image: ghcr.io/mggarofalo/gh-plane-sync:latest
    restart: unless-stopped
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - PLANE_API_KEY=${PLANE_API_KEY}
    volumes:
      - ./config.yaml:/etc/gh-plane-sync/config.yaml:ro
      - sync-data:/var/lib/gh-plane-sync

volumes:
  sync-data:
